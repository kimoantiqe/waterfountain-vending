<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="-apple-system, 'SF Pro Display', 'Inter', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A2434"/><stop offset="1" stop-color="#101826"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- sponsored chip -->
  <g transform="translate(300,68)">
    <rect x="-90" y="-18" width="180" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="0" y="5" font-size="13" fill="#9CB2C9" text-anchor="middle" letter-spacing="1.4">SPONSORED BY ACME</text>
  </g>

  <!-- wide logo plate (landscape) -->
  <rect x="120" y="170" width="360" height="190" rx="32" fill="url(#plate)" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>
  <g transform="translate(300,275)">
    <text x="0" y="0" font-size="50" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">ACME</text>
    <line x1="-58" y1="18" x2="58" y2="18" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="1"/>
    <text x="0" y="42" font-size="13" fill="#FFFFFF" fill-opacity="0.55" text-anchor="middle" letter-spacing="3.5">HYDRATION CO.</text>
  </g>

  <!-- tickertape: 4 beat reveal, beat 3 of 4 = "delivered" word currently entering -->
  <g transform="translate(300,440)" text-anchor="middle">
    <text x="0" y="0" font-size="30" font-weight="600" fill="#FFFFFF" letter-spacing="1.5">
      <tspan fill="#FFFFFF" fill-opacity="1">Stay</tspan>
      <tspan dx="14" fill="#FFFFFF" fill-opacity="1">hydrated,</tspan>
      <tspan dx="14" fill="#FFFFFF" fill-opacity="0.55">stay</tspan>
      <tspan dx="14" fill="#FFFFFF" fill-opacity="0.18">you.</tspan>
    </text>
    <text x="0" y="34" font-size="13" fill="#7B92AB" letter-spacing="2">A MESSAGE FROM YOUR SPONSOR</text>
  </g>

  <!-- caret cursor under the actively-revealing word -->
  <rect x="346" y="450" width="14" height="2" fill="#4FB8E6"/>

  <!-- hairline progress wire across the very bottom of the surface -->
  <rect x="0" y="730" width="600" height="2" fill="#FFFFFF" fill-opacity="0.06"/>
  <rect x="0" y="730" width="360" height="2" fill="#4FB8E6"/>
  <circle cx="360" cy="731" r="3" fill="#7FD4F5"/>

  <!-- tiny status line above wire -->
  <text x="300" y="710" font-size="11" fill="#3E5067" text-anchor="middle" letter-spacing="2">POURING · 9s LEFT</text>

  <text x="300" y="775" font-size="11" fill="#3E5067" text-anchor="middle" font-style="italic">Option 6 · Tickertape Reveal · 3 of 4 words shown + 60% hairline</text>
</svg>
