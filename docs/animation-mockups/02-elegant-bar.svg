<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="-apple-system, 'SF Pro Display', 'Inter', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A2434"/>
      <stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4FB8E6"/>
      <stop offset="1" stop-color="#7FD4F5"/>
    </linearGradient>
    <filter id="barGlow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="plateShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="600" height="800" fill="url(#bg2)"/>

  <!-- sponsored chip -->
  <g transform="translate(300,80)">
    <rect x="-90" y="-18" width="180" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="0" y="5" font-size="13" fill="#9CB2C9" text-anchor="middle" letter-spacing="1.4">SPONSORED BY ACME</text>
  </g>

  <!-- plate shadow -->
  <rect x="190" y="200" width="220" height="220" rx="56" fill="#000000" fill-opacity="0.55" filter="url(#plateShadow)"/>

  <!-- squircle plate -->
  <rect x="190" y="200" width="220" height="220" rx="56"
        fill="url(#plate)" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>

  <!-- top inner highlight -->
  <path d="M 210 222 Q 300 208 390 222" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1" fill="none"/>

  <!-- logo (placeholder wordmark on plate) -->
  <g transform="translate(300,310)">
    <text x="0" y="0" font-size="44" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">ACME</text>
    <line x1="-44" y1="14" x2="44" y2="14" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="1"/>
    <text x="0" y="34" font-size="11" fill="#FFFFFF" fill-opacity="0.50" text-anchor="middle" letter-spacing="3">HYDRATION CO.</text>
  </g>

  <!-- elegant loading bar (capsule, ~60% filled) -->
  <g transform="translate(120,490)">
    <!-- track -->
    <rect x="0" y="0" width="360" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.08"/>
    <!-- soft glow under fill -->
    <rect x="0" y="-2" width="216" height="10" rx="5" fill="#4FB8E6" fill-opacity="0.55" filter="url(#barGlow)"/>
    <!-- fill (~60%) -->
    <rect x="0" y="0" width="216" height="6" rx="3" fill="url(#barFill)"/>
    <!-- leading dot accent -->
    <circle cx="216" cy="3" r="5" fill="#FFFFFF"/>
    <circle cx="216" cy="3" r="9" fill="#7FD4F5" fill-opacity="0.35"/>
  </g>

  <!-- tick labels (subtle, 4 beats) -->
  <g font-size="10" fill="#3E5067" text-anchor="middle">
    <text x="120" y="520">start</text>
    <text x="210" y="520">·</text>
    <text x="300" y="520">·</text>
    <text x="390" y="520">·</text>
    <text x="480" y="520">refreshed</text>
  </g>

  <!-- animationMessage -->
  <g transform="translate(300,600)">
    <text x="0" y="0" font-size="24" font-weight="500" fill="#E6EEF7" text-anchor="middle">Stay hydrated, stay you.</text>
    <text x="0" y="34" font-size="14" fill="#7B92AB" text-anchor="middle">Brought to you by Acme · Hydration Co.</text>
  </g>

  <!-- caption -->
  <text x="300" y="775" font-size="11" fill="#3E5067" text-anchor="middle" font-style="italic">Option 2 · Elegant Capsule Bar · ~60% progress</text>
</svg>
