<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="-apple-system, 'SF Pro Display', 'Inter', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <radialGradient id="coin" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#2A3A52"/>
      <stop offset="0.7" stop-color="#16213A"/>
      <stop offset="1" stop-color="#0B1220"/>
    </radialGradient>
    <filter id="coinShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- sponsored chip -->
  <g transform="translate(300,72)">
    <rect x="-90" y="-18" width="180" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="0" y="5" font-size="13" fill="#9CB2C9" text-anchor="middle" letter-spacing="1.4">SPONSORED BY ACME</text>
  </g>

  <!-- shadow under coin -->
  <ellipse cx="300" cy="640" rx="180" ry="22" fill="#000000" fill-opacity="0.6" filter="url(#coinShadow)"/>

  <!-- coin face -->
  <circle cx="300" cy="400" r="170" fill="url(#coin)" stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="1.4"/>

  <!-- guilloché inner ring (subtle premium detail) -->
  <circle cx="300" cy="400" r="148" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="0.6" stroke-dasharray="1 3"/>
  <circle cx="300" cy="400" r="140" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="0.6"/>

  <!-- perimeter progress arc (~60%, sweeping clockwise from 12 o'clock) -->
  <!-- 60% of 360 = 216 deg; end at angle (270 + 216) = 126 deg from +x axis -->
  <!-- start point (top): (300, 230). end point: cos(126)= -0.588, sin(126)=0.809 -> (300 + 170*-0.588, 400 + 170*0.809) = (200, 538) -->
  <path d="M 300 230 A 170 170 0 1 1 200 538"
        fill="none" stroke="#4FB8E6" stroke-width="3" stroke-linecap="round"/>
  <!-- start tick -->
  <circle cx="300" cy="230" r="4" fill="#7FD4F5"/>
  <!-- leading head -->
  <circle cx="200" cy="538" r="6" fill="#FFFFFF"/>
  <circle cx="200" cy="538" r="11" fill="#7FD4F5" fill-opacity="0.35"/>

  <!-- logo lockup on coin -->
  <g transform="translate(300,395)">
    <text x="0" y="0" font-size="44" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2.5">ACME</text>
    <line x1="-46" y1="14" x2="46" y2="14" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1"/>
    <text x="0" y="34" font-size="11" fill="#FFFFFF" fill-opacity="0.55" text-anchor="middle" letter-spacing="3">HYDRATION CO.</text>
  </g>

  <!-- message -->
  <text x="300" y="690" font-size="22" font-weight="500" fill="#E6EEF7" text-anchor="middle">Stay hydrated, stay you.</text>

  <text x="300" y="775" font-size="11" fill="#3E5067" text-anchor="middle" font-style="italic">Option 5 · Medallion · perimeter arc ~60% swept</text>
</svg>
