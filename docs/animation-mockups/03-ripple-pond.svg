<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="-apple-system, 'SF Pro Display', 'Inter', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <radialGradient id="plate" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#1F2C40"/><stop offset="1" stop-color="#0E1726"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- sponsored chip -->
  <g transform="translate(300,72)">
    <rect x="-90" y="-18" width="180" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="0" y="5" font-size="13" fill="#9CB2C9" text-anchor="middle" letter-spacing="1.4">SPONSORED BY ACME</text>
  </g>

  <!-- ripples (expanding) -->
  <g fill="none" stroke="#4FB8E6" stroke-width="1.5" filter="url(#glow)">
    <circle cx="300" cy="400" r="240" stroke-opacity="0.06"/>
    <circle cx="300" cy="400" r="200" stroke-opacity="0.12"/>
    <circle cx="300" cy="400" r="160" stroke-opacity="0.22"/>
    <circle cx="300" cy="400" r="125" stroke-opacity="0.45"/>
  </g>

  <!-- center logo plate (disc) -->
  <circle cx="300" cy="400" r="100" fill="url(#plate)" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1.2"/>
  <circle cx="300" cy="400" r="100" fill="none" stroke="#4FB8E6" stroke-opacity="0.30" stroke-width="0.8"/>

  <!-- logo -->
  <g transform="translate(300,395)">
    <text x="0" y="0" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">ACME</text>
    <line x1="-34" y1="12" x2="34" y2="12" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1"/>
    <text x="0" y="28" font-size="9" fill="#FFFFFF" fill-opacity="0.55" text-anchor="middle" letter-spacing="2.5">HYDRATION</text>
  </g>

  <!-- progress tick row (4 dots, 60% lit) -->
  <g transform="translate(300,580)">
    <circle cx="-30" cy="0" r="4" fill="#4FB8E6"/>
    <circle cx="-10" cy="0" r="4" fill="#4FB8E6"/>
    <circle cx="10"  cy="0" r="4" fill="#FFFFFF" fill-opacity="0.15"/>
    <circle cx="30"  cy="0" r="4" fill="#FFFFFF" fill-opacity="0.15"/>
  </g>

  <!-- message -->
  <text x="300" y="640" font-size="22" font-weight="500" fill="#E6EEF7" text-anchor="middle">Every drop counts.</text>
  <text x="300" y="672" font-size="14" fill="#7B92AB" text-anchor="middle">Pouring your water…</text>

  <text x="300" y="775" font-size="11" fill="#3E5067" text-anchor="middle" font-style="italic">Option 3 · Concentric Ripples · ~60% (3 of 4 ripples emitted)</text>
</svg>
