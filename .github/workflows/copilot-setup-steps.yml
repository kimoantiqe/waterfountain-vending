# Preinstalls the JDK + Gradle deps so the Copilot coding agent can compile
# and test without trial-and-error. Must contain a single job named
# `copilot-setup-steps`.
name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Warm dependency cache (compile dev debug)
        run: ./gradlew :app:compileDevDebugKotlin --console=plain
