name: Build Vending APK (Prod)

on:
  push:
    branches:
      - release
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-prod-debug:
    name: Test and Build prodDebug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version metadata
        id: version
        run: |
          BASE_VERSION=$(grep -m1 'versionName = ' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          COMMIT_COUNT=$(git rev-list --count HEAD)

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION_NAME="${BASE_VERSION}-${COMMIT_COUNT}-g${SHORT_SHA}"
          fi

          VERSION_CODE="${COMMIT_COUNT}"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "Resolved versionName=${VERSION_NAME}, versionCode=${VERSION_CODE}"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Unit tests (devDebug)
        run: ./gradlew :app:testDevDebugUnitTest --console=plain

      - name: Android lint (non-blocking)
        continue-on-error: true
        run: ./gradlew :app:lintProdDebug --console=plain

      - name: Assemble prodDebug APK
        run: >-
          ./gradlew :app:assembleProdDebug
          -PciVersionName=${{ steps.version.outputs.version_name }}
          -PciVersionCode=${{ steps.version.outputs.version_code }}
          --console=plain

      - name: Stage APK with versioned filename
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/prod/debug/app-prod-debug.apk \
            dist/waterfountain-vending-${{ steps.version.outputs.version_name }}-prod-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: waterfountain-vending-prod-debug-${{ steps.version.outputs.version_name }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Vending APK ${{ steps.version.outputs.version_name }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: "true"
          generate_release_notes: true
          files: dist/*.apk

      - name: Publish release-branch pre-release
        if: github.event_name == 'push' && github.ref == 'refs/heads/release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.version.outputs.version_name }}
          name: Release-branch build ${{ steps.version.outputs.version_name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: "false"
          generate_release_notes: true
          files: dist/*.apk
