name: PR Check

on:
  pull_request:
    branches:
      - main
      - release

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Compile, test & lint (devDebug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Compile (devDebug)
        run: ./gradlew :app:compileDevDebugKotlin --console=plain

      - name: Unit tests (devDebug)
        run: ./gradlew :app:testDevDebugUnitTest --console=plain

      - name: Android lint (non-blocking)
        continue-on-error: true
        run: ./gradlew :app:lintDevDebug --console=plain
