name: Build Vending APK (Dev)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dev-debug:
    name: Test and Build devDebug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version metadata
        id: version
        run: |
          BASE_VERSION=$(grep -m1 'versionName = ' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION_NAME="${BASE_VERSION}-${COMMIT_COUNT}-g${SHORT_SHA}"
          VERSION_CODE="${COMMIT_COUNT}"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "Resolved versionName=${VERSION_NAME}, versionCode=${VERSION_CODE}"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Unit tests (devDebug)
        run: ./gradlew :app:testDevDebugUnitTest --console=plain

      - name: Android lint (non-blocking)
        continue-on-error: true
        run: ./gradlew :app:lintDevDebug --console=plain

      - name: Assemble devDebug APK
        run: >-
          ./gradlew :app:assembleDevDebug
          -PciVersionName=${{ steps.version.outputs.version_name }}
          -PciVersionCode=${{ steps.version.outputs.version_code }}
          --console=plain

      - name: Stage APK with versioned filename
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/dev/debug/app-dev-debug.apk \
            dist/waterfountain-vending-${{ steps.version.outputs.version_name }}-dev-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: waterfountain-vending-dev-debug-${{ steps.version.outputs.version_name }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish dev pre-release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.version.outputs.version_name }}
          name: Dev build ${{ steps.version.outputs.version_name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: "false"
          generate_release_notes: true
          files: dist/*.apk
